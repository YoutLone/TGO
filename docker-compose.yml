services:
  web:
    build:
      context: .
      target: production
    ports:
      - "8080:80"
    restart: unless-stopped

  web-dev:
    build:
      context: .
      target: development
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
